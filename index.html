<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PineTech CyberDef — статистика сезонов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* Стили такие же, как в предыдущем ответе */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #0a0f1a 50%, #070b12 100%);
            color: #e2e8f0;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(59,130,246,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(96,165,250,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(59,130,246,0.3), 0 0 10px rgba(59,130,246,0.1); }
            50% { box-shadow: 0 0 20px rgba(59,130,246,0.5), 0 0 30px rgba(59,130,246,0.2); }
        }
        
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes cardFlip {
            0% { transform: perspective(1000px) rotateY(90deg); opacity: 0; }
            100% { transform: perspective(1000px) rotateY(0); opacity: 1; }
        }
        
        .header {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 35px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            animation: slideDown 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }
        
        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: borderFlow 3s ease infinite, shimmer 2s linear infinite;
        }
        
        .header:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        
        h1 {
            font-size: 2.3rem;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        h1 .icon {
            font-size: 2.5rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }
        
        .badge {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            animation: glowPulse 2s ease-in-out infinite;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-top: 12px;
            font-size: 0.95rem;
            animation: fadeIn 1s ease-out 0.3s both;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(22, 34, 54, 0.9) 100%);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: cardFlip 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) backwards;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .stat-card:hover::before {
            left: 100%;
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .stat-card:hover::after {
            transform: scaleX(1);
        }
        
        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 20px 40px -12px rgba(59,130,246,0.3);
        }
        
        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover .stat-number {
            transform: scale(1.08);
            background: linear-gradient(135deg, #93c5fd, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
        }
        
        .stat-label {
            color: #94a3b8;
            margin-top: 8px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .season-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-radius: 60px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            animation: slideInLeft 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .season-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            color: #cbd5e1;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }
        
        .season-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }
        
        .season-btn:hover::before {
            width: 250px;
            height: 250px;
        }
        
        .season-btn:hover {
            background: #334155;
            border-color: #60a5fa;
            color: white;
            transform: translateY(-3px);
        }
        
        .season-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: #3b82f6;
            color: white;
            animation: glowPulse 2s ease-in-out infinite;
        }
        
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
            animation: slideInRight 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.1s both;
        }
        
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(71, 85, 105, 0.5);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(4px);
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            background: #1e293b;
            transform: scale(1.01);
        }
        
        .search-input::placeholder {
            color: #64748b;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59,130,246,0.4);
        }
        
        .refresh-btn:active {
            transform: translateY(0);
        }
        
        .view-toggle {
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .view-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: 13px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        
        .view-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        
        .view-btn:hover::before {
            width: 150px;
            height: 150px;
        }
        
        .view-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
            transform: scale(1.02);
        }
        
        .view-btn:hover:not(.active) {
            color: white;
            background: rgba(59, 130, 246, 0.3);
        }
        
        .season-info {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(22, 34, 54, 0.9) 100%);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: slideInRight 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) backwards;
        }
        
        .season-info:hover {
            transform: translateX(10px);
            border-left-width: 6px;
            border-left-color: #60a5fa;
        }
        
        .season-title {
            font-size: 1.7rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        
        .season-meta {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .season-meta span {
            transition: all 0.3s ease;
            cursor: default;
            padding: 4px 0;
        }
        
        .season-meta span:hover {
            color: #60a5fa;
            transform: translateX(3px);
        }
        
        .podium {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.4s both;
        }
        
        .podium-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(26, 35, 50, 0.9) 100%);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, 0.2);
            animation: scaleIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) backwards;
        }
        
        .podium-card:nth-child(1) { animation-delay: 0.5s; }
        .podium-card:nth-child(2) { animation-delay: 0.55s; }
        .podium-card:nth-child(3) { animation-delay: 0.6s; }
        
        .podium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: radial-gradient(circle at top, rgba(59,130,246,0.15), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .podium-card:hover::before {
            opacity: 1;
        }
        
        .podium-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
        }
        
        .medal-icon {
            font-size: 3rem;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .podium-card:hover .medal-icon {
            transform: scale(1.2) rotate(10deg);
        }
        
        .team-name {
            font-weight: bold;
            margin: 12px 0;
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        
        .podium-card:hover .team-name {
            color: #60a5fa;
        }
        
        .rating {
            font-weight: 800;
            color: #facc15;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }
        
        .podium-card:hover .rating {
            transform: scale(1.05);
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            animation: slideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.5s both;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(26, 35, 50, 0.9) 100%);
            color: #94a3b8;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }
        
        th:hover {
            background: #1a2332;
            color: #e2e8f0;
            transform: scale(1.01);
        }
        
        .sort-icon {
            margin-left: 6px;
            font-size: 10px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        th:hover .sort-icon {
            opacity: 1;
        }
        
        th.sorted .sort-icon {
            opacity: 1;
            color: #3b82f6;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        tr {
            transition: all 0.2s ease;
            animation: slideInLeft 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1) backwards;
        }
        
        tr:hover td {
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.005);
        }
        
        .rank-1 { background: linear-gradient(90deg, rgba(255, 215, 0, 0.08), transparent); border-left: 3px solid #ffd700; }
        .rank-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.08), transparent); border-left: 3px solid #c0c0c0; }
        .rank-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.08), transparent); border-left: 3px solid #cd7f32; }
        
        .chart-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            animation: scaleIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.5s both;
            height: 450px;
            transition: all 0.3s;
        }
        
        .chart-container:hover {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 30px -10px rgba(59,130,246,0.2);
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            color: #64748b;
            font-size: 1rem;
            animation: fadeIn 0.5s ease;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
            animation: fadeIn 0.5s ease;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            margin-left: 12px;
            border: 3px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: rotate 0.8s linear infinite;
            vertical-align: middle;
        }
        
        .error-message {
            text-align: center;
            padding: 60px;
            color: #ef4444;
            font-size: 1rem;
            animation: fadeIn 0.5s ease;
        }
        
        footer {
            margin-top: 40px;
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
            padding: 25px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            animation: fadeIn 1s ease-out 0.8s both;
        }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .season-btn { padding: 6px 14px; font-size: 11px; }
            th, td { padding: 8px 6px; font-size: 10px; }
            .season-title { font-size: 1.2rem; }
            .podium { gap: 10px; }
            .team-name { font-size: 0.85rem; }
            .rating { font-size: 1rem; }
            .controls-bar { flex-direction: column; }
            .chart-container { height: 300px; }
            .stat-number { font-size: 2rem; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <span class="icon">🛡️</span>
            PineTech CyberDef
            <span class="badge" id="liveBadge">LIVE</span>
        </h1>
        <div class="subtitle">Полная статистика сезонов • Рейтинги • Графики • Аналитика</div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number">—</div><div class="stat-label">Загрузка...</div></div>
    </div>
    
    <div class="season-selector" id="seasonSelector">
        <div class="loading" style="background:transparent; padding:0;">Загрузка сезонов...</div>
    </div>

    <div class="controls-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск команды, отделения или типа..." autocomplete="off">
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить данные</button>
        <div class="view-toggle">
            <button class="view-btn active" data-view="table">📋 Таблица</button>
            <button class="view-btn" data-view="chart">📊 График</button>
        </div>
    </div>
    
    <div id="content">
        <div class="loading">📊 Загрузка данных...</div>
    </div>
    
    <footer>
        Данные загружены из JSON • Обновлено: <span id="timestamp">—</span>
    </footer>
</div>

<script>
    // JSON файл в том же репозитории
    const JSON_DATA_URL = 'data.json';
    
    let fullData = {};
    let seasonsList = [];
    let currentSeason = null;
    let currentView = 'table';
    let chartInstance = null;
    let sortColumn = null;
    let sortDirection = 'desc';
    let searchQuery = '';
    let isLoading = false;
    
    // Загрузка JSON файла
    async function loadJSON() {
        try {
            const response = await fetch(`${JSON_DATA_URL}?v=${Date.now()}`); // Добавляем timestamp чтобы избежать кэша
            if (!response.ok) throw new Error(`HTTP ${response.status} - файл data.json не найден`);
            const data = await response.json();
            fullData = data; // Ваш JSON имеет структуру { "season_1": {...}, "season_2": {...} }
            seasonsList = Object.keys(fullData).map(key => ({
                id: key,
                name: fullData[key].metadata.name,
                totalTeams: fullData[key].metadata.totalTeams
            }));
            return true;
        } catch (error) {
            console.error('Ошибка загрузки JSON:', error);
            throw error;
        }
    }
    
    // Получить данные сезона
    function getSeasonData(seasonId) {
        return fullData[seasonId];
    }
    
    // Обновить статистические карточки
    function renderStatsCards() {
        const statsGrid = document.getElementById('statsGrid');
        const totalTeams = seasonsList.reduce((sum, s) => sum + (fullData[s.id]?.metadata?.totalTeams || 0), 0);
        let highestRating = 0;
        let bestSeasonName = '';
        let allTimeBestTeam = { name: '—', rating: 0 };
        
        for (const season of seasonsList) {
            const seasonData = fullData[season.id];
            if (!seasonData) continue;
            const rating = seasonData.summary?.highestRating || 0;
            if (rating > highestRating) {
                highestRating = rating;
                bestSeasonName = seasonData.metadata?.name || '';
            }
            const bestTeam = seasonData.summary?.bestTeam;
            if (bestTeam && bestTeam.rating > allTimeBestTeam.rating) {
                allTimeBestTeam = bestTeam;
            }
        }
        
        statsGrid.innerHTML = `
            <div class="stat-card"><div class="stat-number">${seasonsList.length}</div><div class="stat-label">Сезонов</div></div>
            <div class="stat-card"><div class="stat-number">${totalTeams}</div><div class="stat-label">Всего команд</div></div>
            <div class="stat-card"><div class="stat-number">${highestRating}</div><div class="stat-label">Макс. рейтинг (${bestSeasonName})</div></div>
            <div class="stat-card"><div class="stat-number" style="font-size:1.2rem;">${allTimeBestTeam.name || '—'}</div><div class="stat-label">Абсолютный чемпион (${allTimeBestTeam.rating || '—'})</div></div>
        `;
    }
    
    // Отобразить кнопки сезонов
    function renderSeasonSelector() {
        const selector = document.getElementById('seasonSelector');
        if (!seasonsList.length) {
            selector.innerHTML = '<div class="loading">Нет доступных сезонов</div>';
            return;
        }
        
        selector.innerHTML = seasonsList.map(season => {
            const isActive = currentSeason === season.id;
            return `<button class="season-btn ${isActive ? 'active' : ''}" data-season="${season.id}">${season.name} (${season.totalTeams})</button>`;
        }).join('');
        
        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isLoading) return;
                const seasonId = btn.dataset.season;
                if (seasonId !== currentSeason) {
                    currentSeason = seasonId;
                    sortColumn = null;
                    renderSeasonSelector();
                    renderLeaderboard();
                }
            });
        });
    }
    
    // Получить полную таблицу лидеров
    function getFullLeaderboard(seasonData) {
        return seasonData?.standings?.fullLeaderboard || [];
    }
    
    // Получить топ-3
    function getTop3(seasonData) {
        return seasonData?.standings?.top3 || [];
    }
    
    // Сортировка
    function sortData(data, column, direction) {
        if (!data.length) return data;
        return [...data].sort((a, b) => {
            let valA = a[column];
            let valB = b[column];
            if (valA == null) valA = '';
            if (valB == null) valB = '';
            if (typeof valA === 'string') {
                valA = valA.toLowerCase();
                valB = valB.toLowerCase();
                if (valA < valB) return direction === 'asc' ? -1 : 1;
                if (valA > valB) return direction === 'asc' ? 1 : -1;
                return 0;
            }
            return direction === 'asc' ? valA - valB : valB - valA;
        });
    }
    
    // Фильтрация
    function filterData(data, query) {
        if (!data.length || !query.trim()) return data;
        const lowerQuery = query.toLowerCase();
        return data.filter(team => 
            (team.name && team.name.toLowerCase().includes(lowerQuery)) ||
            (team.department && team.department.toLowerCase().includes(lowerQuery)) ||
            (team.type && team.type.toLowerCase().includes(lowerQuery))
        );
    }
    
    // Отрисовка таблицы
    function renderTable(data) {
        const filteredData = filterData(data, searchQuery);
        if (filteredData.length === 0) return '<div class="no-results">🔍 Ничего не найдено</div>';
        
        const headers = [
            { key: 'rank', label: '#' },
            { key: 'name', label: 'Команда' },
            { key: 'rating', label: 'Рейтинг' },
            { key: 'wins', label: 'Победы' },
            { key: 'losses', label: 'Поражения' },
            { key: 'tokensSpent', label: 'Токены' },
            { key: 'department', label: 'Отделение' },
            { key: 'type', label: 'Тип' }
        ];
        
        const headersHTML = headers.map(h => {
            const isSorted = sortColumn === h.key;
            const sortIcon = isSorted ? (sortDirection === 'asc' ? ' ▲' : ' ▼') : ' ⇅';
            return `<th data-column="${h.key}">${h.label}<span class="sort-icon">${sortIcon}</span></th>`;
        }).join('');
        
        const rowsHTML = filteredData.map(team => {
            let rankClass = '';
            if (team.rank === 1) rankClass = 'rank-1';
            else if (team.rank === 2) rankClass = 'rank-2';
            else if (team.rank === 3) rankClass = 'rank-3';
            return `
                <tr class="${rankClass}">
                    <td><strong>${team.rank || '—'}</strong></td>
                    <td>${team.name || '—'}</td>
                    <td class="rating">${team.rating || 0}</td>
                    <td>${team.wins || 0}</td>
                    <td>${team.losses || 0}</td>
                    <td>${team.tokensSpent || 0}</td>
                    <td>${team.department || '—'}</td>
                    <td>${team.type || '—'}</td>
                </tr>
            `;
        }).join('');
        
        return `<div class="table-wrapper"><table><thead><tr>${headersHTML}</table></thead><tbody>${rowsHTML}</tbody></table></div>`;
    }
    
    // Отрисовка графика
    function renderChart() {
        return `<div class="chart-container"><canvas id="ratingChart"></canvas></div>`;
    }
    
    // Создание или обновление графика
    function createOrUpdateChart(data) {
        const canvas = document.getElementById('ratingChart');
        if (!canvas) return;
        const filteredData = filterData(data, searchQuery).slice(0, 20);
        if (filteredData.length === 0) return;
        
        if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
        
        chartInstance = new Chart(canvas, {
            type: 'bar',
            data: {
                labels: filteredData.map(t => t.name?.length > 15 ? t.name.substring(0, 15) + '…' : t.name),
                datasets: [{
                    label: 'Рейтинг',
                    data: filteredData.map(t => t.rating || 0),
                    backgroundColor: filteredData.map((_, i) => 
                        i === 0 ? 'rgba(255, 215, 0, 0.8)' : i === 1 ? 'rgba(192, 192, 192, 0.8)' : i === 2 ? 'rgba(205, 127, 50, 0.8)' : 'rgba(59, 130, 246, 0.6)'
                    ),
                    borderColor: filteredData.map((_, i) => 
                        i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#3b82f6'
                    ),
                    borderRadius: 8,
                    borderWidth: 1,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => [`Рейтинг: ${ctx.raw}`] } } },
                scales: { y: { grid: { color: 'rgba(148, 163, 184, 0.1)' }, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8', maxRotation: 45 } } },
                animation: { duration: 800, easing: 'easeInOutQuart' }
            }
        });
    }
    
    // Отображение лидерборда
    function renderLeaderboard() {
        const seasonData = getSeasonData(currentSeason);
        const content = document.getElementById('content');
        if (!seasonData) { content.innerHTML = '<div class="loading">❌ Нет данных</div>'; return; }
        
        let fullLeaderboard = getFullLeaderboard(seasonData);
        if (sortColumn && fullLeaderboard.length) {
            fullLeaderboard = sortData(fullLeaderboard, sortColumn, sortDirection);
        }
        
        let html = `
            <div class="season-info">
                <div class="season-title">🏆 ${seasonData.metadata.name}</div>
                <div class="season-meta">
                    <span>📅 ID: ${seasonData.metadata.id}</span>
                    <span>👥 Команд: ${seasonData.metadata.totalTeams}</span>
                    <span>⭐ Лучший рейтинг: ${seasonData.summary?.highestRating || '—'}</span>
                    <span>🏅 Чемпион: ${seasonData.summary?.bestTeam?.name || '—'} (${seasonData.summary?.bestTeam?.rating || '—'})</span>
                </div>
            </div>
        `;
        
        const top3 = getTop3(seasonData);
        if (top3.length) {
            html += `
                <div class="season-info" style="border-left-color: #facc15;">
                    <div style="font-size: 1.2rem; margin-bottom: 15px;">🥇 ПРИЗЁРЫ</div>
                    <div class="podium">${top3.map(team => `
                        <div class="podium-card">
                            <div class="medal-icon">${team.medal?.split(' ')[0] || '🏆'}</div>
                            <div class="team-name">${team.name || '—'}</div>
                            <div class="rating">${team.rating || 0}</div>
                            <div>${team.stats?.wins || 0}W - ${team.stats?.losses || 0}L</div>
                            <div style="font-size:0.75rem;">${team.department || '—'} • ${team.type || '—'}</div>
                        </div>
                    `).join('')}</div>
                </div>
            `;
        }
        
        html += currentView === 'table' ? renderTable(fullLeaderboard) : renderChart();
        content.innerHTML = html;
        
        if (currentView === 'chart') {
            setTimeout(() => createOrUpdateChart(fullLeaderboard), 100);
        }
        
        // Добавляем обработчики сортировки
        document.querySelectorAll('th[data-column]').forEach(th => {
            th.addEventListener('click', () => {
                if (isLoading) return;
                const column = th.dataset.column;
                if (sortColumn === column) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = column;
                    sortDirection = 'desc';
                }
                renderLeaderboard();
            });
        });
        
        document.getElementById('timestamp').innerText = new Date().toLocaleString('ru-RU');
    }
    
    // Принудительное обновление (перезагрузка JSON)
    async function refreshData() {
        if (isLoading) return;
        
        isLoading = true;
        const refreshBtn = document.getElementById('refreshBtn');
        const originalText = refreshBtn.innerHTML;
        refreshBtn.innerHTML = '🔄 Обновление...';
        refreshBtn.disabled = true;
        
        try {
            await loadJSON();
            seasonsList = Object.keys(fullData).map(key => ({
                id: key,
                name: fullData[key].metadata.name,
                totalTeams: fullData[key].metadata.totalTeams
            }));
            
            if (!currentSeason && seasonsList.length) {
                currentSeason = seasonsList[0].id;
            }
            
            renderStatsCards();
            renderSeasonSelector();
            renderLeaderboard();
            
            document.getElementById('liveBadge').style.animation = 'glowPulse 0.5s ease-in-out';
            setTimeout(() => {
                document.getElementById('liveBadge').style.animation = 'glowPulse 2s ease-in-out infinite';
            }, 500);
            
        } catch (error) {
            console.error('Ошибка обновления:', error);
            document.getElementById('content').innerHTML = `<div class="error-message">❌ Ошибка загрузки JSON: ${error.message}<br><br>Убедитесь, что файл data.json существует в корне репозитория</div>`;
        } finally {
            refreshBtn.innerHTML = originalText;
            refreshBtn.disabled = false;
            isLoading = false;
        }
    }
    
    // Инициализация
    async function init() {
        try {
            await loadJSON();
            seasonsList = Object.keys(fullData).map(key => ({
                id: key,
                name: fullData[key].metadata.name,
                totalTeams: fullData[key].metadata.totalTeams
            }));
            
            if (!seasonsList.length) {
                throw new Error('Нет доступных сезонов');
            }
            
            currentSeason = seasonsList[0].id;
            renderStatsCards();
            renderSeasonSelector();
            renderLeaderboard();
            
            // Настройка обработчиков
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                if (currentView === 'table') {
                    renderLeaderboard();
                } else if (currentView === 'chart') {
                    const seasonData = getSeasonData(currentSeason);
                    if (seasonData) {
                        let fullLeaderboard = getFullLeaderboard(seasonData);
                        if (sortColumn && fullLeaderboard.length) {
                            fullLeaderboard = sortData(fullLeaderboard, sortColumn, sortDirection);
                        }
                        createOrUpdateChart(fullLeaderboard);
                    } else {
                        renderLeaderboard();
                    }
                }
            });
            
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (isLoading) return;
                    currentView = btn.dataset.view;
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (currentView === 'table' && chartInstance) {
                        chartInstance.destroy();
                        chartInstance = null;
                    }
                    renderLeaderboard();
                });
            });
            
            document.getElementById('refreshBtn').addEventListener('click', refreshData);
            
        } catch (error) {
            console.error('Ошибка инициализации:', error);
            document.getElementById('content').innerHTML = `<div class="error-message">❌ Ошибка загрузки JSON: ${error.message}<br><br>Убедитесь, что файл data.json существует в корне репозитория</div>`;
            document.getElementById('statsGrid').innerHTML = '<div class="stat-card"><div class="stat-number">⚠️</div><div class="stat-label">Ошибка JSON</div></div>';
        }
    }
    
    init();
</script>
</body>
</html>
