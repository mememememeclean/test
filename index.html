<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PineTech CyberDef — статистика сезонов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #0a0f1a 100%);
            color: #e2e8f0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* Светлая тема */
        body.light-theme {
            background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%);
            color: #1e293b;
        }
        body.light-theme .stat-card, body.light-theme .season-info, 
        body.light-theme .table-wrapper, body.light-theme .season-selector,
        body.light-theme .chart-container {
            background: rgba(255, 255, 255, 0.9);
        }
        body.light-theme .season-btn { background: rgba(241, 245, 249, 0.9); color: #1e293b; }
        body.light-theme .search-input { background: rgba(255,255,255,0.9); color: #1e293b; }
        body.light-theme th { background: rgba(226,232,240,0.9); color: #334155; }
        
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(59,130,246,0.3); }
            50% { box-shadow: 0 0 20px rgba(59,130,246,0.5); }
        }
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        .header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 35px;
            margin-bottom: 30px;
            position: relative;
            animation: slideDown 0.7s ease-out;
            transition: all 0.3s;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd);
            background-size: 200% 100%;
            animation: borderFlow 3s ease infinite;
        }
        .header:hover { transform: translateY(-5px); }
        
        h1 { font-size: 2.3rem; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        h1 .icon { font-size: 2.5rem; animation: float 3s ease-in-out infinite; }
        .badge {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            animation: glowPulse 2s infinite;
        }
        .subtitle { color: #94a3b8; margin-top: 12px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            border: 1px solid rgba(59,130,246,0.2);
            transition: all 0.3s;
            cursor: pointer;
        }
        .stat-card:hover { transform: translateY(-8px); border-color: #3b82f6; }
        
        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-label { color: #94a3b8; margin-top: 8px; font-size: 0.85rem; }
        
        .season-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(30,41,59,0.5);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-radius: 60px;
            animation: slideInLeft 0.6s ease-out;
        }
        
        .season-btn {
            background: rgba(15,23,42,0.8);
            border: 1px solid rgba(71,85,105,0.5);
            color: #cbd5e1;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .season-btn:hover { background: #334155; transform: translateY(-2px); }
        .season-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            animation: glowPulse 2s infinite;
        }
        
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
            animation: slideInRight 0.6s ease-out;
        }
        
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(71,85,105,0.5);
            background: rgba(30,41,59,0.8);
            color: #e2e8f0;
            font-size: 14px;
        }
        .search-input:focus { outline: none; border-color: #3b82f6; }
        
        .refresh-btn, .theme-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .refresh-btn:hover, .theme-btn:hover { transform: translateY(-2px); }
        .refresh-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .view-toggle {
            display: flex;
            gap: 8px;
            background: rgba(30,41,59,0.8);
            border-radius: 50px;
            padding: 5px;
        }
        .view-btn {
            padding: 8px 20px;
            border-radius: 40px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s;
        }
        .view-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        .view-btn:hover:not(.active) { background: rgba(59,130,246,0.3); color: white; }
        
        .season-info {
            background: rgba(30,41,59,0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
            transition: all 0.3s;
            animation: slideInRight 0.6s ease-out;
        }
        .season-info:hover { transform: translateX(8px); border-left-color: #60a5fa; }
        .season-title {
            font-size: 1.7rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .season-meta { display: flex; gap: 25px; flex-wrap: wrap; color: #94a3b8; font-size: 0.85rem; }
        
        .podium {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
            animation: slideUp 0.6s ease-out;
        }
        .podium-card {
            background: rgba(15,23,42,0.9);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(59,130,246,0.2);
        }
        .podium-card:hover { transform: translateY(-8px); }
        .medal-icon { font-size: 3rem; transition: transform 0.3s; }
        .podium-card:hover .medal-icon { transform: scale(1.2) rotate(10deg); }
        .team-name { font-weight: bold; margin: 12px 0; font-size: 1.1rem; }
        .rating { font-weight: 800; color: #facc15; font-size: 1.5rem; }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(30,41,59,0.7);
            border: 1px solid rgba(59,130,246,0.2);
            animation: slideUp 0.7s ease-out;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            background: rgba(15,23,42,0.9);
            color: #94a3b8;
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }
        th:hover { color: #e2e8f0; }
        .sort-icon { margin-left: 6px; font-size: 10px; opacity: 0.5; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        tr:hover td { background: rgba(59,130,246,0.1); }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.08), transparent); border-left: 3px solid #ffd700; }
        .rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.08), transparent); border-left: 3px solid #c0c0c0; }
        .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.08), transparent); border-left: 3px solid #cd7f32; }
        
        .chart-container {
            background: rgba(30,41,59,0.7);
            border-radius: 20px;
            padding: 20px;
            height: 450px;
            animation: scaleIn 0.6s ease-out;
        }
        
        .no-results, .loading, .error-message {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            margin-left: 12px;
            border: 3px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: rotate 0.8s linear infinite;
            vertical-align: middle;
        }
        .error-message { color: #ef4444; }
        
        footer {
            margin-top: 40px;
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
            padding: 25px;
            border-top: 1px solid rgba(59,130,246,0.2);
        }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .season-btn { padding: 6px 14px; font-size: 11px; }
            th, td { padding: 8px 6px; font-size: 10px; }
            .season-title { font-size: 1.2rem; }
            .podium { gap: 10px; }
            .controls-bar { flex-direction: column; }
            .chart-container { height: 300px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><span class="icon">🛡️</span> PineTech CyberDef <span class="badge" id="liveBadge">LIVE</span></h1>
        <div class="subtitle">Полная статистика сезонов • Рейтинги • Графики • Аналитика</div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number">—</div><div class="stat-label">Загрузка...</div></div>
    </div>
    
    <div class="season-selector" id="seasonSelector">
        <div class="loading" style="background:transparent; padding:10px;">Загрузка сезонов...</div>
    </div>

    <div class="controls-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск команды..." autocomplete="off">
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить</button>
        <button class="theme-btn" id="themeToggle">🌙 Тёмная</button>
        <div class="view-toggle">
            <button class="view-btn active" data-view="table">📋 Таблица</button>
            <button class="view-btn" data-view="chart">📊 График</button>
        </div>
    </div>
    
    <div id="content"><div class="loading">📊 Загрузка данных...</div></div>
    
    <footer>Данные из data.json • Обновлено: <span id="timestamp">—</span></footer>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    // ИЗМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШУ (ГДЕ ЛЕЖИТ data.json)
    const JSON_URL = 'data.json';
    // ================================
    
    let fullData = {};
    let seasonsList = [];
    let currentSeason = null;
    let currentView = 'table';
    let chartInstance = null;
    let sortColumn = null;
    let sortDirection = 'desc';
    let searchQuery = '';
    let isLoading = false;
    
    async function loadJSON() {
        const response = await fetch(`${JSON_URL}?v=${Date.now()}`);
        if (!response.ok) throw new Error(`Файл data.json не найден (${response.status})`);
        const data = await response.json();
        fullData = data;
        seasonsList = Object.keys(fullData)
            .filter(key => fullData[key] !== null)
            .map(key => ({
                id: key,
                name: fullData[key].metadata.name,
                totalTeams: fullData[key].metadata.totalTeams
            }));
        return true;
    }
    
    function getFullLeaderboard(season) { return season?.standings?.fullLeaderboard || []; }
    function getTop3(season) { return season?.standings?.top3 || []; }
    
    function renderStatsCards() {
        const totalTeams = seasonsList.reduce((sum, s) => sum + (fullData[s.id]?.metadata?.totalTeams || 0), 0);
        let highestRating = 0, bestSeasonName = '', allTimeBestTeam = { name: '—', rating: 0 };
        
        for (const season of seasonsList) {
            const seasonData = fullData[season.id];
            if (!seasonData) continue;
            const rating = seasonData.summary?.highestRating || 0;
            if (rating > highestRating) { 
                highestRating = rating; 
                bestSeasonName = seasonData.metadata?.name || ''; 
            }
            const bestTeam = seasonData.summary?.bestTeam;
            if (bestTeam && bestTeam.rating > allTimeBestTeam.rating) allTimeBestTeam = bestTeam;
        }
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-number">${seasonsList.length}</div><div class="stat-label">Сезонов</div></div>
            <div class="stat-card"><div class="stat-number">${totalTeams}</div><div class="stat-label">Всего команд</div></div>
            <div class="stat-card"><div class="stat-number">${highestRating}</div><div class="stat-label">Макс. рейтинг (${bestSeasonName})</div></div>
            <div class="stat-card"><div class="stat-number" style="font-size:1.2rem;">${allTimeBestTeam.name}</div><div class="stat-label">Абсолютный чемпион (${allTimeBestTeam.rating})</div></div>
        `;
    }
    
    function renderSeasonSelector() {
        if (!seasonsList.length) {
            document.getElementById('seasonSelector').innerHTML = '<div class="loading">Нет сезонов</div>';
            return;
        }
        if (!currentSeason) currentSeason = seasonsList[0].id;
        
        document.getElementById('seasonSelector').innerHTML = seasonsList.map(season => 
            `<button class="season-btn ${currentSeason === season.id ? 'active' : ''}" data-season="${season.id}">${season.name} (${season.totalTeams})</button>`
        ).join('');
        
        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isLoading && btn.dataset.season !== currentSeason) {
                    currentSeason = btn.dataset.season;
                    sortColumn = null;
                    renderSeasonSelector();
                    renderLeaderboard();
                }
            });
        });
    }
    
    function sortData(data, column, direction) {
        if (!data.length) return data;
        return [...data].sort((a, b) => {
            let valA = a[column] ?? '', valB = b[column] ?? '';
            if (typeof valA === 'string') { valA = valA.toLowerCase(); valB = valB.toLowerCase(); }
            if (valA < valB) return direction === 'asc' ? -1 : 1;
            if (valA > valB) return direction === 'asc' ? 1 : -1;
            return 0;
        });
    }
    
    function filterData(data) {
        if (!data.length || !searchQuery.trim()) return data;
        const lower = searchQuery.toLowerCase();
        return data.filter(team => 
            (team.name && team.name.toLowerCase().includes(lower)) ||
            (team.department && team.department.toLowerCase().includes(lower))
        );
    }
    
    function renderTable(data) {
        const filtered = filterData(data);
        if (!filtered.length) return '<div class="no-results">🔍 Ничего не найдено</div>';
        
        const headers = ['rank', 'name', 'rating', 'wins', 'losses', 'tokensSpent', 'department', 'type'];
        const labels = ['#', 'Команда', 'Рейтинг', 'W', 'L', 'Токены', 'Отделение', 'Тип'];
        const headersHTML = headers.map((h, i) => `<th data-column="${h}">${labels[i]}<span class="sort-icon">${sortColumn === h ? (sortDirection === 'asc' ? ' ▲' : ' ▼') : ' ⇅'}</span></th>`).join('');
        const rowsHTML = filtered.map(team => `<tr class="${team.rank === 1 ? 'rank-1' : team.rank === 2 ? 'rank-2' : team.rank === 3 ? 'rank-3' : ''}">
            <td><strong>${team.rank}</strong></td>
            <td>${team.name || '—'}</td>
            <td class="rating">${team.rating}</td>
            <td>${team.wins}</td>
            <td>${team.losses}</td>
            <td>${team.tokensSpent}</td>
            <td>${team.department || '—'}</td>
            <td>${team.type || '—'}</td>
        </tr>`).join('');
        return `<div class="table-wrapper"><table><thead><tr>${headersHTML}</tr></thead><tbody>${rowsHTML}</tbody></table></div>`;
    }
    
    function renderChart(data) {
        const filtered = filterData(data);
        if (!filtered.length) return '<div class="no-results">🔍 Нет данных</div>';
        return `<div class="chart-container"><canvas id="ratingChart"></canvas></div>`;
    }
    
    function createOrUpdateChart(data) {
        const canvas = document.getElementById('ratingChart');
        if (!canvas) return;
        const filtered = filterData(data).slice(0, 20);
        if (!filtered.length) return;
        if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
        
        chartInstance = new Chart(canvas, {
            type: 'bar',
            data: {
                labels: filtered.map(t => t.name?.length > 15 ? t.name.substring(0, 15) + '…' : t.name),
                datasets: [{
                    label: 'Рейтинг',
                    data: filtered.map(t => t.rating),
                    backgroundColor: filtered.map((_, i) => i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#3b82f6'),
                    borderRadius: 8
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, animation: { duration: 500 } }
        });
    }
    
    async function renderLeaderboard() {
        const season = fullData[currentSeason];
        if (!season) { document.getElementById('content').innerHTML = '<div class="loading">❌ Нет данных</div>'; return; }
        
        let fullLeaderboard = getFullLeaderboard(season);
        if (sortColumn && fullLeaderboard.length) fullLeaderboard = sortData(fullLeaderboard, sortColumn, sortDirection);
        const top3 = getTop3(season);
        
        let html = `
            <div class="season-info">
                <div class="season-title">🏆 ${season.metadata.name}</div>
                <div class="season-meta">
                    <span>📅 ID: ${season.metadata.id}</span>
                    <span>👥 Команд: ${season.metadata.totalTeams}</span>
                    <span>⭐ Лучший рейтинг: ${season.summary?.highestRating || '—'}</span>
                    <span>🏅 Чемпион: ${season.summary?.bestTeam?.name || '—'} (${season.summary?.bestTeam?.rating || '—'})</span>
                </div>
            </div>
            <div class="season-info" style="border-left-color:#facc15;">
                <div style="font-size:1.2rem; margin-bottom:15px;">🥇 ПРИЗЁРЫ</div>
                <div class="podium">${top3.map(team => `
                    <div class="podium-card">
                        <div class="medal-icon">${team.medal?.split(' ')[0] || '🏆'}</div>
                        <div class="team-name">${team.name || '—'}</div>
                        <div class="rating">${team.rating}</div>
                        <div>${team.stats?.wins || 0}W - ${team.stats?.losses || 0}L</div>
                        <div style="font-size:0.75rem;">${team.department || '—'} • ${team.type || '—'}</div>
                    </div>
                `).join('')}</div>
            </div>
        `;
        
        html += currentView === 'table' ? renderTable(fullLeaderboard) : renderChart(fullLeaderboard);
        document.getElementById('content').innerHTML = html;
        if (currentView === 'chart') setTimeout(() => createOrUpdateChart(fullLeaderboard), 100);
        
        document.querySelectorAll('th[data-column]').forEach(th => {
            th.addEventListener('click', () => {
                const column = th.dataset.column;
                if (sortColumn === column) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                else { sortColumn = column; sortDirection = 'desc'; }
                renderLeaderboard();
            });
        });
    }
    
    async function refreshData() {
        if (isLoading) return;
        isLoading = true;
        const btn = document.getElementById('refreshBtn');
        const original = btn.innerHTML;
        btn.innerHTML = '🔄 Обновление...';
        btn.disabled = true;
        
        try {
            await loadJSON();
            renderStatsCards();
            renderSeasonSelector();
            await renderLeaderboard();
            document.getElementById('timestamp').innerHTML = new Date().toLocaleString('ru-RU');
            document.getElementById('liveBadge').style.animation = 'none';
            setTimeout(() => document.getElementById('liveBadge').style.animation = 'glowPulse 2s infinite', 50);
        } catch (err) {
            document.getElementById('content').innerHTML = `<div class="error-message">❌ ${err.message}<br><br>Убедитесь, что файл data.json есть в папке</div>`;
        } finally {
            btn.innerHTML = original;
            btn.disabled = false;
            isLoading = false;
        }
    }
    
    async function init() {
        await refreshData();
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderLeaderboard();
        });
        
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentView = btn.dataset.view;
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (currentView === 'table' && chartInstance) { chartInstance.destroy(); chartInstance = null; }
                renderLeaderboard();
            });
        });
        
        document.getElementById('refreshBtn').addEventListener('click', refreshData);
        
        let isDark = true;
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            isDark = !document.body.classList.contains('light-theme');
            document.getElementById('themeToggle').innerHTML = isDark ? '🌙 Тёмная' : '☀️ Светлая';
        });
    }
    
    init();
</script>
</body>
</html>
