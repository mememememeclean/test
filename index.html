<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PineTech CyberDef — расширенная аналитика сезонов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <style>
        /* ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==================== */
        :root {
            --bg-primary: #060b14;
            --bg-secondary: #0c1424;
            --bg-tertiary: #111b2e;
            --bg-card: rgba(14, 23, 42, 0.75);
            --bg-card-hover: rgba(20, 32, 56, 0.85);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-active: rgba(47, 128, 237, 0.55);
            --accent: #2f80ed;
            --accent-light: #56ccf2;
            --accent-purple: #8b5cf6;
            --text-primary: #e8f0fe;
            --text-secondary: #8fa3c0;
            --text-muted: #5b6e8c;
            --gold: #f7c948;
            --silver: #b8c7dd;
            --bronze: #d6976a;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --radius-xl: 2.5rem;
            --radius-lg: 1.8rem;
            --radius-md: 1.2rem;
            --radius-sm: 0.8rem;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.7);
            --shadow-glow: 0 0 30px rgba(47, 128, 237, 0.35);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            --font-main: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        }

        /* ==================== СБРОС СТИЛЕЙ ==================== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 15% 30%, rgba(47, 128, 237, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 20%, rgba(86, 204, 242, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 25% 70%, rgba(47, 128, 237, 0.03) 0%, transparent 45%);
            color: var(--text-primary);
            font-family: var(--font-main);
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            letter-spacing: -0.01em;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== ФОНОВЫЕ ЭФФЕКТЫ ==================== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1.5);
            }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(47, 128, 237, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(47, 128, 237, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 65%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 65%);
        }

        .ambient-glow {
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background:
                radial-gradient(circle at 65% 20%, rgba(47, 128, 237, 0.1), transparent 45%),
                radial-gradient(circle at 30% 70%, rgba(86, 204, 242, 0.07), transparent 45%),
                radial-gradient(circle at 80% 85%, rgba(139, 92, 246, 0.05), transparent 45%);
            pointer-events: none;
            z-index: 0;
            animation: ambientDrift 30s ease-in-out infinite alternate;
        }

        @keyframes ambientDrift {
            0% {
                transform: translate(-3%, -3%) rotate(0deg);
                opacity: 0.6;
            }
            33% {
                transform: translate(1%, 2%) rotate(1deg);
                opacity: 0.9;
            }
            66% {
                transform: translate(2%, -1%) rotate(2deg);
                opacity: 0.7;
            }
            100% {
                transform: translate(-1%, 1%) rotate(0.5deg);
                opacity: 0.8;
            }
        }

        /* ==================== КОНТЕЙНЕР ==================== */
        .container {
            max-width: 1680px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        /* ==================== АНИМАЦИИ ПОЯВЛЕНИЯ ==================== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes scaleInBounce {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            60% {
                opacity: 1;
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes rotateIn {
            from {
                opacity: 0;
                transform: rotate(-8deg) scale(0.9);
            }
            to {
                opacity: 1;
                transform: rotate(0) scale(1);
            }
        }

        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 12px rgba(47, 128, 237, 0.45);
            }
            50% {
                box-shadow: 0 0 35px rgba(86, 204, 242, 0.75);
            }
        }

        @keyframes shimmerBorder {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0px);
            }
            25% {
                transform: translateY(-6px);
            }
            75% {
                transform: translateY(3px);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @keyframes slideInStaggered {
            from {
                opacity: 0;
                transform: translateX(-25px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ==================== ШАПКА ==================== */
        .header {
            background: rgba(8, 16, 30, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius-xl);
            padding: 2.5rem 3rem;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            animation: fadeInDown 0.7s ease-out;
            transition: all var(--transition-smooth);
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg,
                    var(--accent),
                    var(--accent-light),
                    var(--accent-purple),
                    var(--accent-light),
                    var(--accent));
            background-size: 300% 100%;
            animation: shimmerBorder 4s linear infinite;
            opacity: 0.8;
        }

        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(47, 128, 237, 0.08), transparent 60%);
            pointer-events: none;
        }

        .header:hover {
            border-color: rgba(47, 128, 237, 0.35);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), 0 20px 45px -15px rgba(47, 128, 237, 0.2);
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-icon {
            font-size: 3.2rem;
            filter: drop-shadow(0 0 18px rgba(47, 128, 237, 0.7));
            animation: floatIcon 4s ease-in-out infinite;
            display: inline-block;
        }

        .header h1 {
            font-size: 2.6rem;
            font-weight: 750;
            background: linear-gradient(135deg, #ffffff 0%, #bdd3f0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .header-badges {
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.35rem 1.4rem;
            border-radius: 3rem;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge-live {
            background: linear-gradient(135deg, #2f80ed, #1a4a9e);
            color: white;
            box-shadow: 0 0 22px rgba(47, 128, 237, 0.6);
            animation: glowPulse 2.5s infinite;
        }

        .badge-beta {
            background: rgba(139, 92, 246, 0.25);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.4);
        }

        .badge-new {
            background: rgba(39, 174, 96, 0.2);
            color: #6fcf97;
            border: 1px solid rgba(39, 174, 96, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .header-subtitle span {
            background: rgba(47, 128, 237, 0.15);
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-size: 0.82rem;
            letter-spacing: 0.3px;
            border: 1px solid rgba(47, 128, 237, 0.2);
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
        }

        .btn-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all var(--transition-base);
            backdrop-filter: blur(8px);
        }

        .btn-icon:hover {
            background: rgba(47, 128, 237, 0.2);
            border-color: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(47, 128, 237, 0.3);
        }

        .btn-icon.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* ==================== СТАТИСТИЧЕСКИЕ КАРТОЧКИ ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: var(--radius-lg);
            padding: 1.8rem 1.5rem;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all var(--transition-smooth);
            animation: scaleInBounce 0.55s ease backwards;
            position: relative;
            overflow: hidden;
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-card:nth-child(1) {
            animation-delay: 0.06s;
        }
        .stat-card:nth-child(2) {
            animation-delay: 0.12s;
        }
        .stat-card:nth-child(3) {
            animation-delay: 0.18s;
        }
        .stat-card:nth-child(4) {
            animation-delay: 0.24s;
        }
        .stat-card:nth-child(5) {
            animation-delay: 0.30s;
        }
        .stat-card:nth-child(6) {
            animation-delay: 0.36s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(47, 128, 237, 0.12), transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: var(--border-active);
            box-shadow: var(--shadow-glow), 0 20px 35px -15px rgba(0, 0, 0, 0.6);
            background: var(--bg-card-hover);
        }

        .stat-card-icon {
            font-size: 2.2rem;
            position: relative;
            z-index: 1;
        }

        .stat-card-value {
            font-size: 2.8rem;
            font-weight: 850;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            z-index: 1;
            transition: transform 0.3s;
        }

        .stat-card:hover .stat-card-value {
            transform: scale(1.08);
        }

        .stat-card-label {
            color: var(--text-secondary);
            font-weight: 550;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            z-index: 1;
            position: relative;
        }

        .stat-card-sub {
            color: var(--text-muted);
            font-size: 0.75rem;
            z-index: 1;
            position: relative;
        }

        /* ==================== СЕЛЕКТОР СЕЗОНОВ ==================== */
        .season-selector-wrapper {
            background: rgba(6, 14, 26, 0.6);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 5rem;
            padding: 1rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.55s ease;
        }

        .season-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        .season-selector-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 650;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 0.4rem;
            white-space: nowrap;
        }

        .season-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #c2d1e8;
            padding: 0.7rem 1.8rem;
            border-radius: 3.5rem;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .season-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(47, 128, 237, 0.4), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .season-btn:hover::after {
            opacity: 1;
        }

        .season-btn:hover {
            border-color: var(--accent);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(47, 128, 237, 0.3);
        }

        .season-btn.active {
            background: linear-gradient(135deg, #2f80ed, #1d5fd4);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 8px 25px rgba(47, 128, 237, 0.5);
            font-weight: 750;
        }

        .season-btn.active::after {
            opacity: 0;
        }

        /* ==================== ПАНЕЛЬ УПРАВЛЕНИЯ ==================== */
        .controls-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            background: rgba(8, 16, 30, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 0.8rem 1.8rem;
            border-radius: 5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: fadeInUp 0.6s ease;
        }

        .search-wrapper {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(17, 27, 44, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.9rem 1.2rem 0.9rem 2.8rem;
            border-radius: 4rem;
            color: white;
            font-size: 0.93rem;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            font-family: var(--font-main);
        }

        .search-icon {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 1rem;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(47, 128, 237, 0.3);
            background: #0f1a2b;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-clear {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.3rem;
            display: none;
            transition: color 0.2s;
        }

        .search-clear:hover {
            color: white;
        }

        .search-clear.visible {
            display: block;
        }

        .btn {
            padding: 0.85rem 1.8rem;
            border-radius: 4rem;
            font-weight: 650;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 0.9rem;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            letter-spacing: 0.3px;
            font-family: var(--font-main);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2f80ed, #1749a0);
            color: white;
            box-shadow: 0 4px 18px rgba(47, 128, 237, 0.4);
        }

        .btn-primary:hover {
            filter: brightness(1.2);
            transform: scale(1.03);
            box-shadow: 0 6px 22px rgba(47, 128, 237, 0.55);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            background: rgba(47, 128, 237, 0.15);
            border-color: var(--accent);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
        }

        .view-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4rem;
            padding: 0.3rem;
            gap: 0.2rem;
        }

        .view-btn {
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            border: none;
            background: transparent;
            color: #a2b9d9;
            font-weight: 650;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 0.88rem;
            font-family: var(--font-main);
        }

        .view-btn:hover {
            color: white;
            background: rgba(47, 128, 237, 0.2);
        }

        .view-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 14px rgba(47, 128, 237, 0.5);
        }

        /* ==================== ИНФОРМАЦИЯ О СЕЗОНЕ ==================== */
        .season-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .season-info-card {
            background: rgba(12, 22, 40, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: var(--radius-lg);
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all var(--transition-smooth);
            animation: fadeInLeft 0.5s ease backwards;
        }

        .season-info-card:nth-child(1) {
            animation-delay: 0.2s;
        }
        .season-info-card:nth-child(2) {
            animation-delay: 0.3s;
        }

        .season-info-card.accent-left {
            border-left: 5px solid var(--accent);
        }

        .season-info-card.accent-gold {
            border-left: 5px solid var(--gold);
        }

        .season-info-card:hover {
            background: rgba(18, 30, 52, 0.78);
            transform: translateX(6px);
        }

        .season-info-card.accent-left:hover {
            border-left-color: var(--accent-light);
        }

        .season-info-title {
            font-size: 1.8rem;
            font-weight: 750;
            color: white;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .season-info-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .season-info-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s;
            cursor: default;
        }

        .season-info-meta span:hover {
            color: var(--accent-light);
        }

        /* ==================== ПОДИУМ ==================== */
        .podium-section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .podium {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .podium-card {
            background: rgba(17, 28, 48, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius-md);
            padding: 2rem 1.2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all var(--transition-smooth);
            animation: scaleIn 0.45s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .podium-card:nth-child(1) {
            animation-delay: 0.35s;
        }
        .podium-card:nth-child(2) {
            animation-delay: 0.42s;
        }
        .podium-card:nth-child(3) {
            animation-delay: 0.49s;
        }

        .podium-card::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at center, rgba(247, 201, 72, 0.08), transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .podium-card:hover::before {
            opacity: 1;
        }

        .podium-card:hover {
            transform: translateY(-14px);
            border-color: var(--gold);
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.6);
            background: rgba(24, 38, 62, 0.8);
        }

        .podium-medal {
            font-size: 3.2rem;
            filter: drop-shadow(0 0 12px currentColor);
            transition: transform 0.3s;
        }

        .podium-card:hover .podium-medal {
            transform: scale(1.2) rotate(5deg);
        }

        .podium-team-name {
            font-weight: 700;
            margin: 0.8rem 0;
            font-size: 1.05rem;
            color: white;
        }

        .podium-rating {
            font-weight: 850;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--gold), #f0a500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .podium-stats {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .podium-details {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* ==================== ТАБЛИЦА ==================== */
        .table-container {
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: rgba(10, 18, 34, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.6s ease backwards;
            animation-delay: 0.4s;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        .table-wrapper::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: rgba(47, 128, 237, 0.4);
            border-radius: 3px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(47, 128, 237, 0.6);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
            min-width: 800px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #b9cef0;
            padding: 1.1rem 1rem;
            font-weight: 650;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            border-bottom: 2px solid rgba(47, 128, 237, 0.3);
        }

        th:hover {
            background: #1a2742;
            color: white;
        }

        th .sort-indicator {
            margin-left: 5px;
            font-size: 0.7rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        th:hover .sort-indicator {
            opacity: 1;
        }

        th.sorted .sort-indicator {
            opacity: 1;
            color: var(--accent);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }

        tbody tr {
            transition: all 0.2s;
            animation: slideInStaggered 0.35s ease backwards;
        }

        tbody tr:nth-child(1) {
            animation-delay: 0.45s;
        }
        tbody tr:nth-child(2) {
            animation-delay: 0.48s;
        }
        tbody tr:nth-child(3) {
            animation-delay: 0.51s;
        }
        tbody tr:nth-child(4) {
            animation-delay: 0.54s;
        }
        tbody tr:nth-child(5) {
            animation-delay: 0.57s;
        }
        tbody tr:nth-child(6) {
            animation-delay: 0.6s;
        }
        tbody tr:nth-child(7) {
            animation-delay: 0.63s;
        }
        tbody tr:nth-child(8) {
            animation-delay: 0.66s;
        }

        tbody tr:hover td {
            background: rgba(47, 128, 237, 0.08);
        }

        .row-rank-1 {
            border-left: 4px solid var(--gold);
            background: rgba(247, 201, 72, 0.03);
        }
        .row-rank-2 {
            border-left: 4px solid var(--silver);
            background: rgba(184, 199, 221, 0.03);
        }
        .row-rank-3 {
            border-left: 4px solid var(--bronze);
            background: rgba(214, 151, 106, 0.03);
        }

        .cell-rating {
            font-weight: 700;
            color: var(--accent-light);
        }

        .cell-rank {
            font-weight: 700;
            font-size: 1rem;
        }

        .cell-name {
            font-weight: 600;
        }

        /* ==================== ГРАФИК ==================== */
        .chart-wrapper {
            border-radius: var(--radius-lg);
            background: rgba(10, 20, 38, 0.65);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: scaleIn 0.5s ease backwards;
            animation-delay: 0.4s;
            transition: all var(--transition-smooth);
        }

        .chart-wrapper:hover {
            border-color: var(--border-active);
            box-shadow: var(--shadow-glow);
        }

        .chart-container {
            position: relative;
            height: 420px;
            width: 100%;
        }

        /* ==================== СОСТОЯНИЯ ЗАГРУЗКИ И ОШИБОК ==================== */
        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            animation: pulse 1.8s ease-in-out infinite;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(47, 128, 237, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .error-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--danger);
            background: rgba(231, 76, 60, 0.08);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        /* ==================== ФУТЕР ==================== */
        .footer {
            margin-top: 2rem;
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.82rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .footer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        /* ==================== АДАПТИВНОСТЬ ==================== */
        @media (max-width: 1024px) {
            .season-details {
                grid-template-columns: 1fr;
            }
            .podium {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 0.7rem;
            }
            .header {
                padding: 1.5rem;
                border-radius: var(--radius-lg);
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .header-icon {
                font-size: 2.5rem;
            }
            .controls-bar {
                flex-direction: column;
                border-radius: var(--radius-lg);
            }
            .stat-card-value {
                font-size: 2.2rem;
            }
            .season-selector-wrapper {
                border-radius: var(--radius-lg);
            }
            th,
            td {
                padding: 0.7rem 0.5rem;
                font-size: 0.8rem;
            }
            .chart-container {
                height: 300px;
            }
        }

        @media (max-width: 480px) {
            .header-badges {
                flex-direction: column;
            }
            .season-btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.78rem;
            }
            .btn {
                padding: 0.7rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- ФОНОВЫЕ ЭФФЕКТЫ -->
    <div class="bg-particles" id="bgParticles"></div>
    <div class="grid-overlay"></div>
    <div class="ambient-glow"></div>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <div class="container">
        <!-- ШАПКА -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-title">
                        <span class="header-icon">🛡️</span>
                        <h1>PineTech CyberDef</h1>
                    </div>
                    <div class="header-subtitle">
                        ⚡ Расширенная статистика сезонов
                        <span>Рейтинги</span>
                        <span>Графики</span>
                        <span>Аналитика</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="header-badges">
                        <span class="badge badge-live" id="liveBadge">● LIVE</span>
                        <span class="badge badge-beta">BETA</span>
                        <span class="badge badge-new">NEW</span>
                    </div>
                    <button class="btn-icon" id="themeToggle" title="Переключить тему">🌓</button>
                    <button class="btn-icon" id="exportBtn" title="Экспорт данных">📥</button>
                </div>
            </div>
        </header>

        <!-- СТАТИСТИЧЕСКИЕ КАРТОЧКИ -->
        <section class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-card-value">—</div>
                <div class="stat-card-label">Загрузка...</div>
            </div>
        </section>

        <!-- СЕЛЕКТОР СЕЗОНОВ -->
        <div class="season-selector-wrapper">
            <div class="season-selector" id="seasonSelector">
                <span class="season-selector-label">📅 Сезон:</span>
                <span style="color: var(--text-muted);">Загрузка...</span>
            </div>
        </div>

        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
        <div class="controls-bar">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск команды, отделения или типа..."
                autocomplete="off">
                <button class="search-clear" id="searchClear" title="Очистить">✕</button>
            </div>
            <button class="btn btn-primary" id="refreshBtn">
                <span>🔄</span> Обновить
            </button>
            <button class="btn btn-outline" id="resetSortBtn">
                <span>↩️</span> Сброс
            </button>
            <div class="view-toggle">
                <button class="view-btn active" data-view="table">📋 Таблица</button>
                <button class="view-btn" data-view="chart">📊 График</button>
                <button class="view-btn" data-view="cards">🃏 Карточки</button>
            </div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main id="content">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p style="margin-top: 1rem;">Загрузка данных...</p>
            </div>
        </main>

        <!-- ФУТЕР -->
        <footer class="footer">
            <span class="footer-dot"></span>
            <span>Данные из data.json</span>
            <span>•</span>
            <span>Обновлено: <strong id="timestamp">—</strong></span>
            <span>•</span>
            <span>PineTech CyberDef © 2024</span>
        </footer>
    </div>

    <script>
        (function() {
            // ==================== КОНФИГУРАЦИЯ ====================
            const JSON_DATA_URL = 'data.json';
            const MAX_CHART_ITEMS = 25;
            const DEBOUNCE_DELAY = 300;

            // ==================== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ====================
            let fullData = {};
            let seasonsList = [];
            let currentSeason = null;
            let currentView = 'table';
            let chartInstance = null;
            let sortColumn = null;
            let sortDirection = 'desc';
            let searchQuery = '';
            let isLoading = false;
            let isDarkTheme = true;
            let searchDebounceTimer = null;

            // ==================== DOM ЭЛЕМЕНТЫ ====================
            const statsGrid = document.getElementById('statsGrid');
            const seasonSelector = document.getElementById('seasonSelector');
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const refreshBtn = document.getElementById('refreshBtn');
            const resetSortBtn = document.getElementById('resetSortBtn');
            const contentEl = document.getElementById('content');
            const timestampEl = document.getElementById('timestamp');
            const liveBadge = document.getElementById('liveBadge');
            const themeToggle = document.getElementById('themeToggle');
            const exportBtn = document.getElementById('exportBtn');
            const bgParticles = document.getElementById('bgParticles');

            // ==================== ЧАСТИЦЫ ФОНА ====================
            function createParticles() {
                const particleCount = 25;
                let html = '';
                for (let i = 0; i < particleCount; i++) {
                    const size = Math.random() * 3 + 1.5;
                    const left = Math.random() * 100;
                    const duration = Math.random() * 18 + 12;
                    const delay = Math.random() * 15;
                    const opacity = Math.random() * 0.25 + 0.08;
                    html +=
                        `<div class="particle" style="width:${size}px;height:${size}px;left:${left}%;animation-duration:${duration}s;animation-delay:${delay}s;opacity:${opacity};"></div>`;
                }
                bgParticles.innerHTML = html;
            }
            createParticles();

            // ==================== ТЕМА ====================
            function toggleTheme() {
                isDarkTheme = !isDarkTheme;
                document.body.style.filter = isDarkTheme ? 'none' : 'invert(0.92) hue-rotate(180deg)';
                themeToggle.classList.toggle('active', !isDarkTheme);
                localStorage.setItem('pineTechTheme', isDarkTheme ? 'dark' : 'light');
            }

            const savedTheme = localStorage.getItem('pineTechTheme');
            if (savedTheme === 'light') {
                isDarkTheme = true;
                toggleTheme();
            }

            themeToggle.addEventListener('click', toggleTheme);

            // ==================== ЭКСПОРТ ДАННЫХ ====================
            function exportData() {
                if (!currentSeason || !fullData[currentSeason]) {
                    alert('Нет данных для экспорта');
                    return;
                }
                const season = fullData[currentSeason];
                const leaderboard = season.standings?.fullLeaderboard || [];
                if (!leaderboard.length) {
                    alert('Нет данных лидерборда для экспорта');
                    return;
                }

                let csv = 'Rank,Team,Rating,Wins,Losses,Tokens,Department,Type\n';
                leaderboard.forEach(team => {
                    csv +=
                        `${team.rank || ''},"${team.name || ''}",${team.rating || 0},${team.wins || 0},${team.losses || 0},${team.tokensSpent || 0},"${team.department || ''}","${team.type || ''}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download =
                    `pinetech_season_${season.metadata?.id || currentSeason}_${new Date().toISOString().slice(0,10)}.csv`;
                link.click();
                URL.revokeObjectURL(url);

                // Визуальная обратная связь
                exportBtn.style.transform = 'scale(1.2)';
                setTimeout(() => { exportBtn.style.transform = 'scale(1)'; }, 200);
            }

            exportBtn.addEventListener('click', exportData);

            // ==================== ЗАГРУЗКА ДАННЫХ ====================
            async function loadJSON() {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                try {
                    const response = await fetch(`${JSON_DATA_URL}?v=${Date.now()}`, {
                        signal: controller.signal,
                        cache: 'no-cache'
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status} — ${response.statusText}`);
                    }

                    const data = await response.json();

                    if (!data || typeof data !== 'object' || Object.keys(data).length === 0) {
                        throw new Error('JSON файл пуст или имеет неверный формат');
                    }

                    fullData = data;
                    seasonsList = Object.keys(fullData).map(key => {
                        const season = fullData[key];
                        return {
                            id: key,
                            name: season?.metadata?.name || `Сезон ${key}`,
                            totalTeams: season?.metadata?.totalTeams || 0,
                            date: season?.metadata?.date || '',
                            highestRating: season?.summary?.highestRating || 0
                        };
                    });

                    // Сортировка сезонов (предполагаем, что более новые идут первыми)
                    seasonsList.sort((a, b) => {
                        const numA = parseInt(a.id.replace(/\D/g, '')) || 0;
                        const numB = parseInt(b.id.replace(/\D/g, '')) || 0;
                        return numB - numA;
                    });

                    return true;
                } catch (error) {
                    clearTimeout(timeoutId);
                    console.error('Ошибка загрузки JSON:', error);

                    if (error.name === 'AbortError') {
                        throw new Error('Превышено время ожидания загрузки (15 секунд)');
                    }
                    throw error;
                }
            }

            // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
            function getFullLeaderboard(season) {
                return season?.standings?.fullLeaderboard || [];
            }

            function getTop3(season) {
                return season?.standings?.top3 || [];
            }

            function getSeasonSummary(season) {
                return season?.summary || {};
            }

            // ==================== СОРТИРОВКА И ФИЛЬТРАЦИЯ ====================
            function sortData(data, column, direction) {
                if (!data || !data.length) return [];
                return [...data].sort((a, b) => {
                    let valA = a[column];
                    let valB = b[column];

                    if (valA == null && valB == null) return 0;
                    if (valA == null) return 1;
                    if (valB == null) return -1;

                    if (typeof valA === 'string') {
                        valA = valA.toLowerCase().trim();
                        valB = (valB || '').toString().toLowerCase().trim();
                        const comparison = valA.localeCompare(valB, 'ru');
                        return direction === 'asc' ? comparison : -comparison;
                    }

                    if (typeof valA === 'number' && typeof valB === 'number') {
                        return direction === 'asc' ? valA - valB : valB - valA;
                    }

                    return 0;
                });
            }

            function filterData(data, query) {
                if (!data || !data.length || !query || !query.trim()) return data;
                const lowerQuery = query.toLowerCase().trim();
                return data.filter(team => {
                    return (
                        (team.name && team.name.toLowerCase().includes(lowerQuery)) ||
                        (team.department && team.department.toLowerCase().includes(lowerQuery)) ||
                        (team.type && team.type.toLowerCase().includes(lowerQuery)) ||
                        (team.rank && team.rank.toString().includes(lowerQuery))
                    );
                });
            }

            // ==================== ОТРИСОВКА СТАТИСТИКИ ====================
            function renderStatsCards() {
                const totalSeasons = seasonsList.length;
                const totalTeams = seasonsList.reduce((sum, s) => sum + (s.totalTeams || 0), 0);

                let highestRating = 0;
                let bestSeasonName = '';
                let allTimeBestTeam = { name: '—', rating: 0, season: '' };
                let totalTokens = 0;
                let totalWins = 0;

                for (const season of seasonsList) {
                    const seasonData = fullData[season.id];
                    if (!seasonData) continue;

                    const rating = seasonData.summary?.highestRating || 0;
                    if (rating > highestRating) {
                        highestRating = rating;
                        bestSeasonName = seasonData.metadata?.name || '';
                    }

                    const bestTeam = seasonData.summary?.bestTeam;
                    if (bestTeam && bestTeam.rating > allTimeBestTeam.rating) {
                        allTimeBestTeam = {
                            name: bestTeam.name || '—',
                            rating: bestTeam.rating || 0,
                            season: seasonData.metadata?.name || ''
                        };
                    }

                    // Дополнительная статистика
                    const leaderboard = seasonData.standings?.fullLeaderboard || [];
                    totalTokens += leaderboard.reduce((sum, t) => sum + (t.tokensSpent || 0), 0);
                    totalWins += leaderboard.reduce((sum, t) => sum + (t.wins || 0), 0);
                }

                const avgTeamsPerSeason = totalSeasons > 0 ? Math.round(totalTeams / totalSeasons) : 0;
                const avgRating = totalSeasons > 0 ? Math.round(highestRating / totalSeasons) : 0;

                const cards = [
                    { icon: '📅', value: totalSeasons, label: 'Всего сезонов', sub: 'активных' },
                    { icon: '👥', value: totalTeams, label: 'Всего команд', sub: `~${avgTeamsPerSeason} за сезон` },
                    { icon: '⭐', value: highestRating, label: 'Макс. рейтинг', sub: bestSeasonName },
                    { icon: '🏆', value: allTimeBestTeam.name, label: 'Абсолютный чемпион',
                        sub: `${allTimeBestTeam.rating} (${allTimeBestTeam.season})` },
                    { icon: '💰', value: totalTokens.toLocaleString(), label: 'Потрачено токенов', sub: 'всего' },
                    { icon: '🎯', value: totalWins.toLocaleString(), label: 'Всего побед', sub: 'по всем сезонам' },
                ];

                statsGrid.innerHTML = cards.map((card, index) => `
                    <div class="stat-card" style="animation-delay: ${0.06 + index * 0.06}s;">
                        <div class="stat-card-icon">${card.icon}</div>
                        <div class="stat-card-value" style="${card.value.toString().length > 10 ? 'font-size:1.3rem;' : ''}">${card.value}</div>
                        <div class="stat-card-label">${card.label}</div>
                        <div class="stat-card-sub">${card.sub}</div>
                    </div>
                `).join('');
            }

            // ==================== ОТРИСОВКА СЕЛЕКТОРА СЕЗОНОВ ====================
            function renderSeasonSelector() {
                if (!seasonsList.length) {
                    seasonSelector.innerHTML =
                        '<span class="season-selector-label">📅 Сезон:</span><span style="color: var(--text-muted);">Нет доступных сезонов</span>';
                    return;
                }

                const buttonsHTML = seasonsList.map(season => {
                    const isActive = currentSeason === season.id;
                    return `
                        <button class="season-btn ${isActive ? 'active' : ''}"
                                data-season="${season.id}"
                                title="${season.name} — ${season.totalTeams} команд">
                            ${season.name}
                            <span style="font-size:0.7rem;opacity:0.7;">(${season.totalTeams})</span>
                        </button>
                    `;
                }).join('');

                seasonSelector.innerHTML =
                    `<span class="season-selector-label">📅 Сезон:</span>${buttonsHTML}`;

                // Назначаем обработчики
                seasonSelector.querySelectorAll('.season-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        if (isLoading) return;
                        const seasonId = this.dataset.season;
                        if (seasonId !== currentSeason) {
                            currentSeason = seasonId;
                            sortColumn = null;
                            sortDirection = 'desc';
                            searchQuery = '';
                            searchInput.value = '';
                            searchClear.classList.remove('visible');
                            renderSeasonSelector();
                            renderContent();
                        }
                    });
                });
            }

            // ==================== ОТРИСОВКА ТАБЛИЦЫ ====================
            function renderTable(data) {
                let processedData = data;
                if (sortColumn) {
                    processedData = sortData(processedData, sortColumn, sortDirection);
                }
                processedData = filterData(processedData, searchQuery);

                if (!processedData.length) {
                    return `
                        <div class="empty-state">
                            <div class="empty-state-icon">🔍</div>
                            <p>Ничего не найдено</p>
                            <p style="font-size:0.85rem;color:var(--text-muted);">Попробуйте изменить поисковый запрос</p>
                        </div>
                    `;
                }

                const columns = [
                    { key: 'rank', label: '#', width: '60px' },
                    { key: 'name', label: 'Команда', width: 'auto' },
                    { key: 'rating', label: 'Рейтинг', width: '100px' },
                    { key: 'wins', label: 'Победы', width: '90px' },
                    { key: 'losses', label: 'Поражения', width: '100px' },
                    { key: 'tokensSpent', label: 'Токены', width: '100px' },
                    { key: 'department', label: 'Отделение', width: '130px' },
                    { key: 'type', label: 'Тип', width: '100px' },
                ];

                const headersHTML = columns.map(col => {
                    const isSorted = sortColumn === col.key;
                    const sortIcon = isSorted ?
                        (sortDirection === 'asc' ? ' ▲' : ' ▼') :
                        ' ⇅';
                    const sortedClass = isSorted ? ' sorted' : '';
                    return `
                        <th data-column="${col.key}"
                            class="${sortedClass}"
                            style="min-width:${col.width};">
                            ${col.label}
                            <span class="sort-indicator">${sortIcon}</span>
                        </th>
                    `;
                }).join('');

                const rowsHTML = processedData.map((team, index) => {
                    let rowClass = '';
                    if (team.rank === 1) rowClass = 'row-rank-1';
                    else if (team.rank === 2) rowClass = 'row-rank-2';
                    else if (team.rank === 3) rowClass = 'row-rank-3';

                    const winRate = (team.wins || 0) + (team.losses || 0) > 0 ?
                        Math.round(((team.wins || 0) / ((team.wins || 0) + (team.losses || 0))) *
                            100) :
                        '—';

                    return `
                        <tr class="${rowClass}" style="animation-delay: ${0.45 + index * 0.03}s;">
                            <td class="cell-rank">${team.rank || '—'}</td>
                            <td class="cell-name" title="${team.name || ''}">${team.name || '—'}</td>
                            <td class="cell-rating">${team.rating || 0}</td>
                            <td>${team.wins || 0}</td>
                            <td>${team.losses || 0}</td>
                            <td>${(team.tokensSpent || 0).toLocaleString()}</td>
                            <td>${team.department || '—'}</td>
                            <td><span style="background:rgba(47,128,237,0.2);padding:0.2rem 0.6rem;border-radius:1rem;font-size:0.8rem;">${team.type || '—'}</span></td>
                        </tr>
                    `;
                }).join('');

                return `
                    <div class="table-container">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>${headersHTML}</tr>
                                </thead>
                                <tbody>
                                    ${rowsHTML}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            // ==================== ОТРИСОВКА ГРАФИКА ====================
            function renderChart(data) {
                let processedData = filterData(data, searchQuery).slice(0, MAX_CHART_ITEMS);

                if (!processedData.length) {
                    return `
                        <div class="empty-state">
                            <div class="empty-state-icon">📊</div>
                            <p>Нет данных для отображения графика</p>
                        </div>
                    `;
                }

                return `
                    <div class="chart-wrapper">
                        <div class="chart-container">
                            <canvas id="ratingChart"></canvas>
                        </div>
                    </div>
                `;
            }

            function createOrUpdateChart(data) {
                const canvas = document.getElementById('ratingChart');
                if (!canvas) return;

                let processedData = filterData(data, searchQuery).slice(0, MAX_CHART_ITEMS);
                if (!processedData.length) return;

                // Уничтожаем предыдущий график
                if (chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }

                const labels = processedData.map(t =>
                    (t.name || '—').length > 18 ?
                    (t.name || '—').substring(0, 18) + '…' :
                    (t.name || '—')
                );

                const ratings = processedData.map(t => t.rating || 0);
                const wins = processedData.map(t => t.wins || 0);
                const losses = processedData.map(t => t.losses || 0);

                const backgroundColors = processedData.map((_, i) => {
                    if (i === 0) return 'rgba(247, 201, 72, 0.85)';
                    if (i === 1) return 'rgba(184, 199, 221, 0.75)';
                    if (i === 2) return 'rgba(214, 151, 106, 0.75)';
                    return 'rgba(47, 128, 237, 0.65)';
                });

                const borderColors = processedData.map((_, i) => {
                    if (i === 0) return '#f7c948';
                    if (i === 1) return '#b8c7dd';
                    if (i === 2) return '#d6976a';
                    return '#2f80ed';
                });

                chartInstance = new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Рейтинг',
                            data: ratings,
                            backgroundColor: backgroundColors,
                            borderColor: borderColors,
                            borderWidth: 1.5,
                            borderRadius: 10,
                            borderSkipped: false,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            intersect: false,
                            mode: 'index',
                        },
                        plugins: {
                            legend: {
                                display: true,
                                labels: {
                                    color: '#94a3b8',
                                    font: { size: 12 },
                                    usePointStyle: true,
                                    pointStyleWidth: 10,
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(10, 20, 40, 0.9)',
                                titleColor: '#fff',
                                bodyColor: '#cbd5e1',
                                borderColor: 'rgba(47,128,237,0.5)',
                                borderWidth: 1,
                                padding: 12,
                                callbacks: {
                                    label: function(ctx) {
                                        const team = processedData[ctx.dataIndex];
                                        return [
                                            `Рейтинг: ${team.rating || 0}`,
                                            `Победы: ${team.wins || 0}`,
                                            `Поражения: ${team.losses || 0}`,
                                            `Токены: ${(team.tokensSpent || 0).toLocaleString()}`,
                                        ];
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    color: 'rgba(148, 163, 184, 0.08)',
                                    drawBorder: false,
                                },
                                ticks: {
                                    color: '#94a3b8',
                                    font: { size: 11 },
                                    padding: 8,
                                }
                            },
                            x: {
                                grid: {
                                    display: false,
                                },
                                ticks: {
                                    color: '#94a3b8',
                                    font: { size: 10 },
                                    maxRotation: 50,
                                    minRotation: 30,
                                    padding: 5,
                                }
                            }
                        },
                        animation: {
                            duration: 900,
                            easing: 'easeInOutQuart',
                        }
                    }
                });
            }

            // ==================== ОТРИСОВКА КАРТОЧЕК ====================
            function renderCards(data) {
                let processedData = filterData(data, searchQuery);
                if (sortColumn) {
                    processedData = sortData(processedData, sortColumn, sortDirection);
                }

                if (!processedData.length) {
                    return `
                        <div class="empty-state">
                            <div class="empty-state-icon">🃏</div>
                            <p>Нет данных для отображения</p>
                        </div>
                    `;
                }

                const cardsHTML = processedData.slice(0, 50).map((team, index) => {
                    let borderColor = 'rgba(47,128,237,0.3)';
                    if (team.rank === 1) borderColor = 'var(--gold)';
                    else if (team.rank === 2) borderColor = 'var(--silver)';
                    else if (team.rank === 3) borderColor = 'var(--bronze)';

                    const winRate = (team.wins || 0) + (team.losses || 0) > 0 ?
                        Math.round(((team.wins || 0) / ((team.wins || 0) + (team.losses || 0))) *
                            100) :
                        'N/A';

                    return `
                        <div style="
                            background: var(--bg-card);
                            backdrop-filter: blur(14px);
                            border-radius: var(--radius-md);
                            padding: 1.3rem;
                            border: 2px solid ${borderColor};
                            transition: all var(--transition-smooth);
                            animation: scaleIn 0.4s ease backwards;
                            animation-delay: ${0.1 + index * 0.03}s;
                            cursor: default;
                        "
                        onmouseover="this.style.transform='translateY(-6px)';this.style.boxShadow='var(--shadow-glow)';"
                        onmouseout="this.style.transform='';this.style.boxShadow='';">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.7rem;">
                                <span style="font-weight:800;font-size:1.3rem;color:${team.rank <= 3 ? borderColor : 'var(--accent-light)'};">#${team.rank || '—'}</span>
                                <span style="font-size:0.8rem;background:rgba(47,128,237,0.2);padding:0.2rem 0.7rem;border-radius:1rem;">${team.type || '—'}</span>
                            </div>
                            <div style="font-weight:700;font-size:1.05rem;margin-bottom:0.5rem;">${team.name || '—'}</div>
                            <div style="display:flex;gap:1rem;flex-wrap:wrap;font-size:0.85rem;color:var(--text-secondary);">
                                <span>⭐ ${team.rating || 0}</span>
                                <span>✅ ${team.wins || 0}W</span>
                                <span>❌ ${team.losses || 0}L</span>
                                <span>💰 ${(team.tokensSpent || 0).toLocaleString()}</span>
                            </div>
                            <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.4rem;">
                                ${team.department || '—'} • Win Rate: ${winRate}%
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;">
                        ${cardsHTML}
                    </div>
                    ${processedData.length > 50 ? `<p style="text-align:center;color:var(--text-muted);margin-top:1rem;">Показано 50 из ${processedData.length} команд</p>` : ''}
                `;
            }

            // ==================== ОСНОВНАЯ ОТРИСОВКА КОНТЕНТА ====================
            function renderContent() {
                const season = fullData[currentSeason];

                if (!season) {
                    contentEl.innerHTML = `
                        <div class="error-state">
                            <p>❌ Данные сезона не найдены</p>
                            <p style="font-size:0.85rem;">Попробуйте выбрать другой сезон или обновить данные</p>
                        </div>
                    `;
                    return;
                }

                const leaderboard = getFullLeaderboard(season);
                const top3 = getTop3(season);
                const summary = getSeasonSummary(season);

                // Верхняя информация о сезоне
                let html = `
                    <div class="season-details">
                        <div class="season-info-card accent-left">
                            <div class="season-info-title">
                                🏆 ${season.metadata?.name || 'Сезон'}
                            </div>
                            <div class="season-info-meta">
                                <span>📅 ${season.metadata?.id || currentSeason}</span>
                                <span>👥 ${season.metadata?.totalTeams || 0} команд</span>
                                <span>⭐ Лучший: ${summary?.highestRating || '—'}</span>
                                <span>🏅 Чемпион: ${summary?.bestTeam?.name || '—'}</span>
                            </div>
                        </div>
                        <div class="season-info-card accent-gold">
                            <div class="season-info-title">
                                🥇 Призёры сезона
                            </div>
                            <div class="podium">
                                ${top3.map((team, i) => `
                                    <div class="podium-card">
                                        <div class="podium-medal">${team.medal?.split(' ')[0] || ['🥇','🥈','🥉'][i] || '🏅'}</div>
                                        <div class="podium-team-name">${team.name || '—'}</div>
                                        <div class="podium-rating">${team.rating || 0}</div>
                                        <div class="podium-stats">${team.stats?.wins || 0}W — ${team.stats?.losses || 0}L</div>
                                        <div class="podium-details">${team.department || '—'} • ${team.type || '—'}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;

                // Основной контент в зависимости от вида
                switch (currentView) {
                    case 'table':
                        html += renderTable(leaderboard);
                        break;
                    case 'chart':
                        html += renderChart(leaderboard);
                        break;
                    case 'cards':
                        html += renderCards(leaderboard);
                        break;
                    default:
                        html += renderTable(leaderboard);
                }

                contentEl.innerHTML = html;

                // Инициализация графика, если нужно
                if (currentView === 'chart') {
                    setTimeout(() => createOrUpdateChart(leaderboard), 150);
                }

                // Назначаем обработчики сортировки для таблицы
                if (currentView === 'table') {
                    contentEl.querySelectorAll('th[data-column]').forEach(th => {
                        th.addEventListener('click', function() {
                            const column = this.dataset.column;
                            if (sortColumn === column) {
                                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                            } else {
                                sortColumn = column;
                                sortDirection = 'desc';
                            }
                            renderContent();
                        });
                    });
                }
            }

            // ==================== ОБНОВЛЕНИЕ ВСЕГО ИНТЕРФЕЙСА ====================
            async function refreshAll() {
                if (isLoading) return;

                isLoading = true;
                refreshBtn.disabled = true;
                refreshBtn.innerHTML = '<span>⏳</span> Загрузка...';

                try {
                    await loadJSON();

                    if (!currentSeason && seasonsList.length > 0) {
                        currentSeason = seasonsList[0].id;
                    } else if (!seasonsList.some(s => s.id === currentSeason) && seasonsList.length > 0) {
                        currentSeason = seasonsList[0].id;
                    }

                    renderStatsCards();
                    renderSeasonSelector();
                    renderContent();

                    // Обновляем временную метку
                    const now = new Date();
                    timestampEl.textContent = now.toLocaleString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });

                    // Анимация LIVE бейджа
                    liveBadge.style.animation = 'none';
                    liveBadge.offsetHeight;
                    liveBadge.style.animation = 'glowPulse 0.6s ease-in-out';
                    setTimeout(() => {
                        liveBadge.style.animation = 'glowPulse 2.5s ease-in-out infinite';
                    }, 600);

                } catch (error) {
                    console.error('Ошибка обновления:', error);
                    contentEl.innerHTML = `
                        <div class="error-state">
                            <p>❌ Ошибка загрузки данных</p>
                            <p style="font-size:0.9rem;">${error.message}</p>
                            <p style="font-size:0.8rem;margin-top:0.8rem;">Убедитесь, что файл data.json существует и доступен</p>
                            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:1rem;">🔄 Попробовать снова</button>
                        </div>
                    `;
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-card-value">⚠️</div>
                            <div class="stat-card-label">Ошибка загрузки</div>
                        </div>
                    `;
                } finally {
                    refreshBtn.disabled = false;
                    refreshBtn.innerHTML = '<span>🔄</span> Обновить';
                    isLoading = false;
                }
            }

            // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
            // Поиск с дебаунсом
            searchInput.addEventListener('input', function() {
                const value = this.value;
                searchClear.classList.toggle('visible', value.length > 0);

                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    searchQuery = value;
                    if (currentView === 'chart' && chartInstance) {
                        chartInstance.destroy();
                        chartInstance = null;
                    }
                    renderContent();
                }, DEBOUNCE_DELAY);
            });

            // Очистка поиска
            searchClear.addEventListener('click', function() {
                searchInput.value = '';
                searchQuery = '';
                this.classList.remove('visible');
                searchInput.focus();
