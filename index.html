<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PineTech CyberDef — статистика сезонов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #0a0f1a 50%, #070b12 100%);
            color: #e2e8f0;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Анимации */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(59,130,246,0.3); }
            50% { box-shadow: 0 0 20px rgba(59,130,246,0.5); }
        }
        
        .header {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 35px;
            margin-bottom: 30px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            animation: slideDown 0.7s ease;
        }
        
        h1 {
            font-size: 2.3rem;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        h1 .icon {
            font-size: 2.5rem;
            animation: fadeIn 1s ease;
        }
        
        .badge {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            animation: glowPulse 2s infinite;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-top: 12px;
        }
        
        /* Карточки статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(22, 34, 54, 0.9) 100%);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.4);
        }
        
        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .stat-label {
            color: #94a3b8;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        
        /* Селектор сезонов */
        .season-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-radius: 60px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .season-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            color: #cbd5e1;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .season-btn:hover {
            background: #334155;
            border-color: #60a5fa;
            color: white;
            transform: translateY(-2px);
        }
        
        .season-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: #3b82f6;
            color: white;
        }
        
        /* Панель управления */
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(71, 85, 105, 0.5);
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            font-size: 14px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59,130,246,0.4);
        }
        
        .view-toggle {
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .view-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .view-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        
        .view-btn:hover:not(.active) {
            color: white;
            background: rgba(59, 130, 246, 0.3);
        }
        
        /* Информация о сезоне */
        .season-info {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(22, 34, 54, 0.9) 100%);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        
        .season-title {
            font-size: 1.7rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        
        .season-meta {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        /* Подиум */
        .podium {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .podium-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(26, 35, 50, 0.9) 100%);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .podium-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        .medal-icon {
            font-size: 3rem;
            display: inline-block;
        }
        
        .team-name {
            font-weight: bold;
            margin: 12px 0;
            font-size: 1.1rem;
        }
        
        .rating {
            font-weight: 800;
            color: #facc15;
            font-size: 1.5rem;
        }
        
        /* ТАБЛИЦА — ИСПРАВЛЕННЫЕ СТИЛИ */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 800px;
        }
        
        th {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #e2e8f0;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #3b82f6;
            cursor: pointer;
            white-space: nowrap;
        }
        
        th:hover {
            background: #334155;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            vertical-align: middle;
        }
        
        /* Цвета для строк */
        .rank-1 {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.15), transparent);
            border-left: 3px solid #ffd700;
        }
        
        .rank-2 {
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.15), transparent);
            border-left: 3px solid #c0c0c0;
        }
        
        .rank-3 {
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.15), transparent);
            border-left: 3px solid #cd7f32;
        }
        
        /* Чередование строк */
        tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        /* Стиль для рейтинга */
        td.rating {
            font-weight: bold;
            color: #60a5fa;
        }
        
        /* График */
        .chart-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            height: 450px;
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            margin-left: 12px;
            border: 3px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            text-align: center;
            padding: 60px;
            color: #ef4444;
        }
        
        footer {
            margin-top: 40px;
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
            padding: 25px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .season-btn { padding: 6px 14px; font-size: 11px; }
            th, td { padding: 8px 6px; font-size: 11px; }
            .season-title { font-size: 1.2rem; }
            .podium { gap: 10px; }
            .team-name { font-size: 0.85rem; }
            .rating { font-size: 1rem; }
            .controls-bar { flex-direction: column; }
            .chart-container { height: 300px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <span class="icon">🛡️</span>
            PineTech CyberDef
            <span class="badge" id="liveBadge">LIVE</span>
        </h1>
        <div class="subtitle">Полная статистика сезонов • Рейтинги • Графики • Аналитика</div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number">—</div><div class="stat-label">Загрузка...</div></div>
    </div>
    
    <div class="season-selector" id="seasonSelector">
        <div class="loading" style="background:transparent; padding:0;">Загрузка сезонов...</div>
    </div>

    <div class="controls-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск команды, отделения или типа..." autocomplete="off">
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить данные</button>
        <div class="view-toggle">
            <button class="view-btn active" data-view="table">📋 Таблица</button>
            <button class="view-btn" data-view="chart">📊 График</button>
        </div>
    </div>
    
    <div id="content">
        <div class="loading">📊 Загрузка данных...</div>
    </div>
    
    <footer>
        Данные загружены из JSON • Обновлено: <span id="timestamp">—</span>
    </footer>
</div>

<script>
    const JSON_DATA_URL = 'data.json';
    
    let fullData = {};
    let seasonsList = [];
    let currentSeason = null;
    let currentView = 'table';
    let chartInstance = null;
    let sortColumn = 'rank';
    let sortDirection = 'asc';
    let searchQuery = '';
    let isLoading = false;
    
    async function loadJSON() {
        try {
            const response = await fetch(`${JSON_DATA_URL}?v=${Date.now()}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            fullData = data;
            seasonsList = Object.keys(fullData).map(key => ({
                id: key,
                name: fullData[key].metadata.name,
                totalTeams: fullData[key].metadata.totalTeams
            }));
            return true;
        } catch (error) {
            console.error('Ошибка загрузки JSON:', error);
            throw error;
        }
    }
    
    function getSeasonData(seasonId) {
        return fullData[seasonId];
    }
    
    function renderStatsCards() {
        const statsGrid = document.getElementById('statsGrid');
        const totalTeams = seasonsList.reduce((sum, s) => sum + (fullData[s.id]?.metadata?.totalTeams || 0), 0);
        let highestRating = 0;
        let bestSeasonName = '';
        let allTimeBestTeam = { name: '—', rating: 0 };
        
        for (const season of seasonsList) {
            const seasonData = fullData[season.id];
            if (!seasonData) continue;
            const rating = seasonData.summary?.highestRating || 0;
            if (rating > highestRating) {
                highestRating = rating;
                bestSeasonName = seasonData.metadata?.name || '';
            }
            const bestTeam = seasonData.summary?.bestTeam;
            if (bestTeam && bestTeam.rating > allTimeBestTeam.rating) {
                allTimeBestTeam = bestTeam;
            }
        }
        
        statsGrid.innerHTML = `
            <div class="stat-card"><div class="stat-number">${seasonsList.length}</div><div class="stat-label">Сезонов</div></div>
            <div class="stat-card"><div class="stat-number">${totalTeams}</div><div class="stat-label">Всего команд</div></div>
            <div class="stat-card"><div class="stat-number">${highestRating}</div><div class="stat-label">Макс. рейтинг (${bestSeasonName})</div></div>
            <div class="stat-card"><div class="stat-number" style="font-size:1.2rem;">${allTimeBestTeam.name || '—'}</div><div class="stat-label">Абсолютный чемпион (${allTimeBestTeam.rating || '—'})</div></div>
        `;
    }
    
    function renderSeasonSelector() {
        const selector = document.getElementById('seasonSelector');
        if (!seasonsList.length) {
            selector.innerHTML = '<div class="loading">Нет доступных сезонов</div>';
            return;
        }
        
        selector.innerHTML = seasonsList.map(season => {
            const isActive = currentSeason === season.id;
            return `<button class="season-btn ${isActive ? 'active' : ''}" data-season="${season.id}">${season.name} (${season.totalTeams})</button>`;
        }).join('');
        
        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isLoading) return;
                const seasonId = btn.dataset.season;
                if (seasonId !== currentSeason) {
                    currentSeason = seasonId;
                    sortColumn = 'rank';
                    sortDirection = 'asc';
                    renderSeasonSelector();
                    renderLeaderboard();
                }
            });
        });
    }
    
    function getFullLeaderboard(seasonData) {
        return seasonData?.standings?.fullLeaderboard || [];
    }
    
    function getTop3(seasonData) {
        return seasonData?.standings?.top3 || [];
    }
    
    function sortData(data, column, direction) {
        if (!data.length) return data;
        return [...data].sort((a, b) => {
            let valA = a[column];
            let valB = b[column];
            if (valA == null) valA = '';
            if (valB == null) valB = '';
            if (typeof valA === 'string') {
                valA = valA.toLowerCase();
                valB = valB.toLowerCase();
                if (valA < valB) return direction === 'asc' ? -1 : 1;
                if (valA > valB) return direction === 'asc' ? 1 : -1;
                return 0;
            }
            return direction === 'asc' ? valA - valB : valB - valA;
        });
    }
    
    function filterData(data, query) {
        if (!data.length || !query.trim()) return data;
        const lowerQuery = query.toLowerCase();
        return data.filter(team => 
            (team.name && team.name.toLowerCase().includes(lowerQuery)) ||
            (team.department && team.department.toLowerCase().includes(lowerQuery)) ||
            (team.type && team.type.toLowerCase().includes(lowerQuery))
        );
    }
    
    function renderTable(data) {
        const filteredData = filterData(data, searchQuery);
        if (filteredData.length === 0) return '<div class="no-results">🔍 Ничего не найдено</div>';
        
        const headers = [
            { key: 'rank', label: '#' },
            { key: 'name', label: 'Команда' },
            { key: 'rating', label: 'Рейтинг' },
            { key: 'wins', label: 'Победы' },
            { key: 'losses', label: 'Поражения' },
            { key: 'tokensSpent', label: 'Токены' },
            { key: 'department', label: 'Отделение' },
            { key: 'type', label: 'Тип' }
        ];
        
        const headersHTML = headers.map(h => {
            const isSorted = sortColumn === h.key;
            const sortIcon = isSorted ? (sortDirection === 'asc' ? ' ▲' : ' ▼') : ' ⇅';
            return `<th data-column="${h.key}">${h.label}<span class="sort-icon">${sortIcon}</span></th>`;
        }).join('');
        
        const rowsHTML = filteredData.map(team => {
            let rankClass = '';
            if (team.rank === 1) rankClass = 'rank-1';
            else if (team.rank === 2) rankClass = 'rank-2';
            else if (team.rank === 3) rankClass = 'rank-3';
            return `
                <tr class="${rankClass}">
                    <td style="font-weight: bold; width: 50px;">${team.rank || '—'}</td>
                    <td style="min-width: 150px;">${team.name || '—'}</td>
                    <td class="rating" style="width: 80px;">${team.rating || 0}</td>
                    <td style="width: 70px;">${team.wins || 0}</td>
                    <td style="width: 70px;">${team.losses || 0}</td>
                    <td style="width: 70px;">${team.tokensSpent || 0}</td>
                    <td style="min-width: 130px;">${team.department || '—'}</td>
                    <td style="width: 80px;"><span style="background: rgba(59,130,246,0.2); padding: 4px 10px; border-radius: 20px;">${team.type || '—'}</span></td>
                </tr>
            `;
        }).join('');
        
        return `<div class="table-wrapper"><table>
            <thead><tr>${headersHTML}</tr></thead>
            <tbody>${rowsHTML}</tbody>
        </table></div>`;
    }
    
    function renderChart() {
        return `<div class="chart-container"><canvas id="ratingChart"></canvas></div>`;
    }
    
    function createOrUpdateChart(data) {
        const canvas = document.getElementById('ratingChart');
        if (!canvas) return;
        const filteredData = filterData(data, searchQuery).slice(0, 20);
        if (filteredData.length === 0) return;
        
        if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
        
        chartInstance = new Chart(canvas, {
            type: 'bar',
            data: {
                labels: filteredData.map(t => t.name?.length > 15 ? t.name.substring(0, 15) + '…' : t.name),
                datasets: [{
                    label: 'Рейтинг',
                    data: filteredData.map(t => t.rating || 0),
                    backgroundColor: filteredData.map((_, i) => 
                        i === 0 ? 'rgba(255, 215, 0, 0.8)' : i === 1 ? 'rgba(192, 192, 192, 0.8)' : i === 2 ? 'rgba(205, 127, 50, 0.8)' : 'rgba(59, 130, 246, 0.6)'
                    ),
                    borderRadius: 8,
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false }, 
                    tooltip: { callbacks: { label: ctx => [`Рейтинг: ${ctx.raw}`] } } 
                },
                scales: { 
                    y: { 
                        grid: { color: 'rgba(148, 163, 184, 0.1)' }, 
                        ticks: { color: '#94a3b8' } 
                    }, 
                    x: { 
                        ticks: { color: '#94a3b8', maxRotation: 45, autoSkip: true } 
                    } 
                }
            }
        });
    }
    
    function renderLeaderboard() {
        const seasonData = getSeasonData(currentSeason);
        const content = document.getElementById('content');
        if (!seasonData) { content.innerHTML = '<div class="loading">❌ Нет данных</div>'; return; }
        
        let fullLeaderboard = getFullLeaderboard(seasonData);
        if (sortColumn && fullLeaderboard.length) {
            fullLeaderboard = sortData(fullLeaderboard, sortColumn, sortDirection);
        }
        
        let html = `
            <div class="season-info">
                <div class="season-title">🏆 ${seasonData.metadata.name}</div>
                <div class="season-meta">
                    <span>📅 ID: ${seasonData.metadata.id}</span>
                    <span>👥 Команд: ${seasonData.metadata.totalTeams}</span>
                    <span>⭐ Лучший рейтинг: ${seasonData.summary?.highestRating || '—'}</span>
                    <span>🏅 Чемпион: ${seasonData.summary?.bestTeam?.name || '—'} (${seasonData.summary?.bestTeam?.rating || '—'})</span>
                </div>
            </div>
        `;
        
        const top3 = getTop3(seasonData);
        if (top3.length) {
            html += `
                <div class="season-info" style="border-left-color: #facc15;">
                    <div style="font-size: 1.2rem; margin-bottom: 15px;">🥇 ПРИЗЁРЫ</div>
                    <div class="podium">${top3.map(team => `
                        <div class="podium-card">
                            <div class="medal-icon">${team.medal?.split(' ')[0] || '🏆'}</div>
                            <div class="team-name">${team.name || '—'}</div>
                            <div class="rating">${team.rating || 0}</div>
                            <div>${team.stats?.wins || 0}W - ${team.stats?.losses || 0}L</div>
                            <div style="font-size:0.75rem; margin-top: 5px;">${team.department || '—'} • ${team.type || '—'}</div>
                        </div>
                    `).join('')}</div>
                </div>
            `;
        }
        
        html += currentView === 'table' ? renderTable(fullLeaderboard) : renderChart();
        content.innerHTML = html;
        
        if (currentView === 'chart') {
            setTimeout(() => createOrUpdateChart(fullLeaderboard), 100);
        }
        
        document.querySelectorAll('th[data-column]').forEach(th => {
            th.addEventListener('click', () => {
                if (isLoading) return;
                const column = th.dataset.column;
                if (sortColumn === column) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = column;
                    sortDirection = 'asc';
                }
                renderLeaderboard();
            });
        });
        
        document.getElementById('timestamp').innerText = new Date().toLocaleString('ru-RU');
    }
    
    async function refreshData() {
        if (isLoading) return;
        
        isLoading = true;
        const refreshBtn = document.getElementById('refreshBtn');
        const originalText = refreshBtn.innerHTML;
        refreshBtn.innerHTML = '🔄 Обновление...';
        refreshBtn.disabled = true;
        
        try {
            await loadJSON();
            seasonsList = Object.keys(fullData).map(key => ({
                id: key,
                name: fullData[key].metadata.name,
                totalTeams: fullData[key].metadata.totalTeams
            }));
            
            if (!currentSeason && seasonsList.length) {
                currentSeason = seasonsList[0].id;
            }
            
            renderStatsCards();
            renderSeasonSelector();
            renderLeaderboard();
        } catch (error) {
            document.getElementById('content').innerHTML = `<div class="error-message">❌ Ошибка загрузки JSON: ${error.message}</div>`;
        } finally {
            refreshBtn.innerHTML = originalText;
            refreshBtn.disabled = false;
            isLoading = false;
        }
    }
    
    async function init() {
        try {
            await loadJSON();
            seasonsList = Object.keys(fullData).map(key => ({
                id: key,
                name: fullData[key].metadata.name,
                totalTeams: fullData[key].metadata.totalTeams
            }));
            
            if (!seasonsList.length) throw new Error('Нет доступных сезонов');
            
            currentSeason = seasonsList[0].id;
            renderStatsCards();
            renderSeasonSelector();
            renderLeaderboard();
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderLeaderboard();
            });
            
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (isLoading) return;
                    currentView = btn.dataset.view;
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (currentView === 'table' && chartInstance) {
                        chartInstance.destroy();
                        chartInstance = null;
                    }
                    renderLeaderboard();
                });
            });
            
            document.getElementById('refreshBtn').addEventListener('click', refreshData);
            
        } catch (error) {
            document.getElementById('content').innerHTML = `<div class="error-message">❌ Ошибка: ${error.message}<br><br>Убедитесь, что файл data.json существует</div>`;
        }
    }
    
    init();
</script>
</body>
</html>
