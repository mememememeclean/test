                if (currentView === 'chart' && chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }
                renderContent();
            });

            // Кнопка обновления
            refreshBtn.addEventListener('click', refreshAll);

            // Кнопка сброса сортировки
            resetSortBtn.addEventListener('click', function() {
                sortColumn = null;
                sortDirection = 'desc';
                searchQuery = '';
                searchInput.value = '';
                searchClear.classList.remove('visible');
                if (chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }
                renderContent();
                this.style.transform = 'scale(0.95)';
                setTimeout(() => { this.style.transform = 'scale(1)'; }, 150);
            });

            // Переключатели вида
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const newView = this.dataset.view;
                    if (newView === currentView) return;

                    currentView = newView;

                    // Обновляем активную кнопку
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove(
                        'active'));
                    this.classList.add('active');

                    // Уничтожаем график при переключении
                    if (chartInstance) {
                        chartInstance.destroy();
                        chartInstance = null;
                    }

                    renderContent();
                });
            });

            // Закрытие поиска по Escape
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.activeElement === searchInput) {
                    searchInput.value = '';
                    searchQuery = '';
                    searchClear.classList.remove('visible');
                    searchInput.blur();
                    if (currentView === 'chart' && chartInstance) {
                        chartInstance.destroy();
                        chartInstance = null;
                    }
                    renderContent();
                }
            });

            // ==================== ИНИЦИАЛИЗАЦИЯ ====================
            async function init() {
                try {
                    await loadJSON();

                    if (seasonsList.length === 0) {
                        throw new Error('Нет доступных сезонов в data.json');
                    }

                    currentSeason = seasonsList[0].id;

                    renderStatsCards();
                    renderSeasonSelector();
                    renderContent();

                    const now = new Date();
                    timestampEl.textContent = now.toLocaleString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });

                } catch (error) {
                    console.error('Ошибка инициализации:', error);
                    contentEl.innerHTML = `
                        <div class="error-state">
                            <p>❌ Не удалось загрузить данные</p>
                            <p style="font-size:0.9rem;">${error.message}</p>
                            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:1rem;">🔄 Перезагрузить</button>
                        </div>
                    `;
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-card-value">⚠️</div>
                            <div class="stat-card-label">Ошибка</div>
                        </div>
                    `;
                }
            }

            // Запуск приложения
            init();

            // Вывод информации в консоль
            console.log('%c🛡️ PineTech CyberDef %cDashboard v2.0',
                'font-size:1.2em;color:#2f80ed;font-weight:bold;',
                'color:#94a3b8;');
            console.log('%cРасширенная аналитика сезонов загружена',
            'color:#56ccf2;');
        })();
    </script>
</body>
</html>
